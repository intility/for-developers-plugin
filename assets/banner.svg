<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Developer Platform Companion — Ship containers to Kubernetes without the YAML">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#1E2540"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="appA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="appB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="appC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- Soft glow on the right -->
  <circle cx="1080" cy="160" r="220" fill="url(#accent)" opacity="0.07"/>

  <!-- Cluster diagram on the right -->
  <g transform="translate(870, 60)">
    <!-- Outer cluster boundary -->
    <rect x="0" y="0" width="320" height="200" rx="20" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="4 6" opacity="0.55"/>
    <text x="16" y="26" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#94A3B8" opacity="0.75">cluster</text>

    <!-- Connecting lines (rendered before nodes so they sit beneath) -->
    <line x1="110" y1="90" x2="210" y2="90" stroke="url(#accent)" stroke-width="1.5" opacity="0.45"/>
    <line x1="90" y1="120" x2="160" y2="160" stroke="url(#accent)" stroke-width="1.5" opacity="0.45"/>
    <line x1="230" y1="120" x2="160" y2="160" stroke="url(#accent)" stroke-width="1.5" opacity="0.45"/>

    <!-- App nodes -->
    <rect x="50" y="60" width="60" height="60" rx="12" fill="url(#appA)"/>
    <rect x="210" y="60" width="60" height="60" rx="12" fill="url(#appB)"/>
    <rect x="130" y="130" width="60" height="60" rx="12" fill="url(#appC)"/>
  </g>

  <!-- ALPHA pill -->
  <g transform="translate(80, 56)">
    <rect width="106" height="26" rx="13" fill="#F97316"/>
    <text x="53" y="18" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#FFFFFF" text-anchor="middle">EARLY ALPHA</text>
  </g>

  <!-- Title -->
  <text x="80" y="158" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#F8FAFC" letter-spacing="-1.5">Developer Platform</text>
  <text x="80" y="222" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#accent)" letter-spacing="-1.5">Companion.</text>

  <!-- Subtitle -->
  <text x="80" y="266" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#94A3B8">Ship containers to Kubernetes — without the YAML.</text>
</svg>
