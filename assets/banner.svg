<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Developer Platform Companion — Ship containers to Kubernetes without the YAML">
  <defs>
    <!-- Bifrost dark-mode base -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071627"/>
      <stop offset="100%" stop-color="#0f2133"/>
    </linearGradient>

    <!-- Title gradient: brand teal → attn pink -->
    <linearGradient id="titleAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0df2d7"/>
      <stop offset="100%" stop-color="#ff6bc4"/>
    </linearGradient>

    <!-- Card gradients: chill (back), attn pink (mid), brand teal (front) -->
    <linearGradient id="cardChill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ad8aff"/>
      <stop offset="100%" stop-color="#5919b8"/>
    </linearGradient>
    <linearGradient id="cardPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6bc4"/>
      <stop offset="100%" stop-color="#bd006e"/>
    </linearGradient>
    <linearGradient id="cardTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0df2d7"/>
      <stop offset="100%" stop-color="#007375"/>
    </linearGradient>

    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- Soft brand glows behind the icon -->
  <circle cx="1030" cy="180" r="180" fill="#ff6bc4" opacity="0.07"/>
  <circle cx="1120" cy="140" r="140" fill="#0df2d7" opacity="0.08"/>

  <!-- Layered platform icon: three stacked cards -->
  <g transform="translate(975, 80)">
    <rect x="40" y="40" width="140" height="140" rx="24" fill="url(#cardChill)" opacity="0.9"/>
    <rect x="20" y="20" width="140" height="140" rx="24" fill="url(#cardPink)"/>
    <rect x="0"  y="0"  width="140" height="140" rx="24" fill="url(#cardTeal)"/>
  </g>

  <!-- ALPHA pill — Bifrost attn (pink) -->
  <g transform="translate(80, 56)">
    <rect width="124" height="28" rx="14" fill="#ff6bc4"/>
    <circle cx="18" cy="14" r="4" fill="#590d44"/>
    <text x="71" y="19" font-family="'Satoshi', 'Satoshi Variable', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#590d44" text-anchor="middle">EARLY ALPHA</text>
  </g>

  <!-- Title -->
  <text x="80" y="166" font-family="'Satoshi', 'Satoshi Variable', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#f3f3f6" letter-spacing="-1.5">Developer Platform</text>
  <text x="80" y="228" font-family="'Satoshi', 'Satoshi Variable', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#titleAccent)" letter-spacing="-1.5">Companion.</text>

  <!-- Subtitle -->
  <text x="80" y="270" font-family="'Open Sans', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#8a98a8">Ship containers to Kubernetes — without the YAML.</text>
</svg>
