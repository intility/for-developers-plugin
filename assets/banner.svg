<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Developer Platform Companion — Ship containers to Kubernetes without the YAML">
  <defs>
    <!-- Bifrost dark-mode base colors -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071627"/>
      <stop offset="100%" stop-color="#0f2133"/>
    </linearGradient>
    <!-- Intility brand teal (Bifrost dark-mode brand) -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0df2d7"/>
      <stop offset="100%" stop-color="#64f7e6"/>
    </linearGradient>
    <!-- App node gradients: brand teal, chill purple, success green -->
    <linearGradient id="appBrand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0df2d7"/>
      <stop offset="100%" stop-color="#007375"/>
    </linearGradient>
    <linearGradient id="appChill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ad8aff"/>
      <stop offset="100%" stop-color="#631cce"/>
    </linearGradient>
    <linearGradient id="appSuccess" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f597"/>
      <stop offset="100%" stop-color="#007a4b"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- Soft brand-teal glow on the right -->
  <circle cx="1080" cy="160" r="220" fill="#0df2d7" opacity="0.08"/>

  <!-- Cluster diagram on the right -->
  <g transform="translate(870, 60)">
    <!-- Outer cluster boundary -->
    <rect x="0" y="0" width="320" height="200" rx="20" fill="none" stroke="url(#brand)" stroke-width="2" stroke-dasharray="4 6" opacity="0.6"/>
    <text x="16" y="26" font-family="'Open Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#8a98a8" letter-spacing="0.5">cluster</text>

    <!-- Connecting lines (beneath nodes) -->
    <line x1="110" y1="90" x2="210" y2="90" stroke="url(#brand)" stroke-width="1.5" opacity="0.5"/>
    <line x1="90" y1="120" x2="160" y2="160" stroke="url(#brand)" stroke-width="1.5" opacity="0.5"/>
    <line x1="230" y1="120" x2="160" y2="160" stroke="url(#brand)" stroke-width="1.5" opacity="0.5"/>

    <!-- App nodes -->
    <rect x="50" y="60" width="60" height="60" rx="12" fill="url(#appBrand)"/>
    <rect x="210" y="60" width="60" height="60" rx="12" fill="url(#appChill)"/>
    <rect x="130" y="130" width="60" height="60" rx="12" fill="url(#appSuccess)"/>
  </g>

  <!-- ALPHA pill — Bifrost warning palette -->
  <g transform="translate(80, 56)">
    <rect width="106" height="26" rx="13" fill="#ffdb70"/>
    <text x="53" y="18" font-family="'Satoshi', 'Satoshi Variable', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#4d3200" text-anchor="middle">EARLY ALPHA</text>
  </g>

  <!-- Title (Satoshi heading) -->
  <text x="80" y="158" font-family="'Satoshi', 'Satoshi Variable', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#f3f3f6" letter-spacing="-1.5">Developer Platform</text>
  <text x="80" y="222" font-family="'Satoshi', 'Satoshi Variable', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#brand)" letter-spacing="-1.5">Companion.</text>

  <!-- Subtitle (Open Sans body) -->
  <text x="80" y="266" font-family="'Open Sans', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#8a98a8">Ship containers to Kubernetes — without the YAML.</text>
</svg>
